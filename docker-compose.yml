services:
  db:
    image: postgres:16-alpine
    container_name: welyat-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: welyat_v0_dev
      POSTGRES_USER: welyat
      POSTGRES_PASSWORD: welyat
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U welyat -d welyat_v0_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend-welyat
      dockerfile: Dockerfile.dev
    container_name: welyat-backend-dev
    restart: unless-stopped
    env_file:
      - ./backend-welyat/.env
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: welyat_v0_dev
      DB_USER: welyat
      DB_PASSWORD: welyat
      FRONTEND_URL: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - ./backend-welyat:/app
      - backend_node_modules:/app/node_modules
    command: sh -c "npm ci --no-audit --no-fund || npm install; npm run migrate; npm run dev"

  frontend:
    build:
      context: ./frontend-welyat
      dockerfile: Dockerfile.dev
    container_name: welyat-frontend-dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      VITE_APP_ID: sina-welyat
    depends_on:
      - backend
    ports:
      - "4000:4000"
    volumes:
      - ./frontend-welyat:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm ci --no-audit --no-fund || npm install; npm run dev -- --host 0.0.0.0 --port 4000 --force"

volumes:
  postgres_data:
  backend_node_modules:
  frontend_node_modules:
